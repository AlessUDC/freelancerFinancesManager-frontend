<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastos — FinancePro</title>
    <meta name="description" content="Gestiona tus gastos freelance. Registra y controla tus egresos.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/src/styles/style.css">
</head>

<body>

    <!-- ══ OFFCANVAS SIDEBAR (móvil) ══ -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasSidebar" aria-labelledby="offcanvasLabel">
        <div class="offcanvas-header" style="background:#1a1c23; border-bottom:1px solid rgba(255,255,255,0.08);">
            <span class="text-white fw-bold" id="offcanvasLabel">
                <i class="fas fa-wallet me-2 text-primary"></i> FinancePro
            </span>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                aria-label="Cerrar"></button>
        </div>
        <div class="offcanvas-body p-0">
            <nav class="sidebar-nav nav flex-column pt-2">
                <a href="../dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="ingresos.html" class="nav-link"><i class="fas fa-chart-line"></i> Ingresos</a>
                <a href="gastos.html" class="nav-link active"><i class="fas fa-shopping-cart"></i> Gastos</a>
                <a href="suscripciones.html" class="nav-link"><i class="fas fa-calendar-check"></i> Suscripciones</a>
                <a href="perfil.html" class="nav-link"><i class="fas fa-user-circle"></i> Mi Perfil</a>
            </nav>
        </div>
    </div>

    <!-- ══ LAYOUT PRINCIPAL ══ -->
    <div id="wrapper">

        <!-- Sidebar escritorio -->
        <div id="sidebar-wrapper">
            <div class="sidebar-heading">
                <i class="fas fa-wallet me-2 text-primary"></i> FinancePro
            </div>
            <nav class="sidebar-nav nav flex-column pt-2">
                <a href="../dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="ingresos.html" class="nav-link"><i class="fas fa-chart-line"></i> Ingresos</a>
                <a href="gastos.html" class="nav-link active"><i class="fas fa-shopping-cart"></i> Gastos</a>
                <a href="suscripciones.html" class="nav-link"><i class="fas fa-calendar-check"></i> Suscripciones</a>
                <a href="perfil.html" class="nav-link"><i class="fas fa-user-circle"></i> Mi Perfil</a>
            </nav>
        </div>

        <!-- Contenido -->
        <div id="page-content-wrapper">

            <!-- Navbar top -->
            <nav class="navbar navbar-expand navbar-light navbar-custom">
                <div class="container-fluid">
                    <button class="btn btn-link text-dark d-md-none me-2 p-0" type="button" data-bs-toggle="offcanvas"
                        data-bs-target="#offcanvasSidebar" aria-label="Menú">
                        <i class="fas fa-bars fa-lg"></i>
                    </button>
                    <h5 class="m-0 fw-semibold text-secondary">
                        <i class="fas fa-shopping-cart me-2 text-danger"></i> Gastos
                    </h5>
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <button class="btn btn-outline-danger btn-sm" id="btnLogout">
                                <i class="fas fa-sign-out-alt"></i>
                                <span class="d-none d-sm-inline ms-1">Cerrar Sesión</span>
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Contenido principal -->
            <div class="container-fluid p-4">

                <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
                    <div>
                        <h1 class="h3 fw-bold text-dark mb-0">Mis Gastos</h1>
                        <p class="text-muted mb-0 small">Registro de todos tus egresos</p>
                    </div>
                    <button class="btn btn-danger shadow-sm" data-bs-toggle="modal" data-bs-target="#modalGasto">
                        <i class="fas fa-plus me-2"></i> Nuevo Gasto
                    </button>
                </div>

                <!-- Tarjeta total -->
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <div class="card card-stat card-expense py-2">
                            <div class="card-body">
                                <div class="d-flex align-items-center justify-content-between">
                                    <div>
                                        <div class="stat-label text-danger">Total Gastos</div>
                                        <div class="stat-value" id="totalGastos">$0.00</div>
                                    </div>
                                    <div class="icon-circle">
                                        <i class="fas fa-receipt text-danger"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tabla -->
                <div class="card panel-card">
                    <div class="card-header bg-white border-0 py-3">
                        <h6 class="m-0 fw-bold text-dark">
                            <i class="fas fa-list me-2 text-danger"></i> Historial de Gastos
                        </h6>
                    </div>
                    <div class="card-body p-0">

                        <!-- Estado vacío -->
                        <div id="noData" class="text-center py-5 text-muted">
                            <i class="fas fa-inbox fa-3x mb-3 opacity-25"></i>
                            <p class="mb-2">No hay gastos registrados aún.</p>
                            <button class="btn btn-sm btn-danger" data-bs-toggle="modal" data-bs-target="#modalGasto">
                                <i class="fas fa-plus me-1"></i> Agregar el primero
                            </button>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Concepto</th>
                                        <th>Monto</th>
                                        <th>Fecha</th>
                                        <th style="width:60px;">Acción</th>
                                    </tr>
                                </thead>
                                <tbody id="gastosTable"></tbody>
                            </table>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- ══ MODAL — Nuevo Gasto ══ -->
    <div class="modal fade" id="modalGasto" tabindex="-1" aria-labelledby="modalGastoLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="modalGastoLabel">
                        <i class="fas fa-plus-circle me-2 text-danger"></i> Nuevo Gasto
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body pt-3">
                    <form id="formGasto" novalidate>
                        <div class="mb-3">
                            <label for="inputConcepto" class="form-label fw-semibold">Concepto</label>
                            <input type="text" class="form-control" id="inputConcepto" placeholder="Ej: Electricidad"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="inputMonto" class="form-label fw-semibold">Monto ($)</label>
                            <input type="number" class="form-control" id="inputMonto" placeholder="0.00" min="0.01"
                                step="0.01" required>
                        </div>
                        <div class="mb-4">
                            <label for="inputFecha" class="form-label fw-semibold">Fecha</label>
                            <input type="date" class="form-control" id="inputFecha">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-danger fw-bold">
                                <i class="fas fa-check me-2"></i> Guardar Gasto
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/src/js/gastos.js"></script>
</body>

</html>
