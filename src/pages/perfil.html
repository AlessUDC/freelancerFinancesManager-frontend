<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Freelancer Finance</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7fc; }
        .profile-card { border: none; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .profile-header { background: linear-gradient(135deg, #4e73df 0%, #224abe 100%); padding: 50px 20px; color: white; text-align: center; }
        .profile-img-container { width: 110px; height: 110px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: -55px auto 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); color: #4e73df; font-size: 3rem; }
        
        .info-label { font-size: 0.85rem; font-weight: 700; color: #b7b9cc; text-transform: uppercase; margin-bottom: 2px; }
        .info-value { font-size: 1.1rem; font-weight: 600; color: #4e73df; margin-bottom: 20px; }
        
        .btn-edit-toggle { background: white; color: #4e73df; border: 2px solid #4e73df; border-radius: 12px; padding: 10px 25px; font-weight: 700; transition: all 0.3s; }
        .btn-edit-toggle:hover { background: #4e73df; color: white; }
        
        .edit-section { display: none; border-top: 1px solid #e3e6f0; padding-top: 30px; margin-top: 20px; }
        
        .form-control { border-radius: 12px; padding: 12px; border: 1px solid #d1d3e2; background-color: #f8f9fc; }
        .btn-save { border-radius: 12px; padding: 12px; font-weight: 700; background: #1cc88a; border: none; color: white; }
        .btn-delete-account { color: #e74a3b; font-weight: 600; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <div class="mb-4">
                    <a href="../dashboard.html" class="text-decoration-none text-muted fw-bold">
                        <i class="fas fa-chevron-left me-2"></i> Volver al Dashboard
                    </a>
                </div>

                <div class="card profile-card">
                    <div class="profile-header">
                        <h2 class="fw-bold mb-1" id="displayNombreHeader">Cargando...</h2>
                        <p class="mb-0 opacity-75" id="displayEmailHeader">usuario@correo.com</p>
                    </div>

                    <div class="card-body px-4 pb-5">
                        <div class="profile-img-container">
                            <i class="fas fa-user-tie"></i>
                        </div>

                        <!-- SECCIÓN DE INFORMACIÓN (VISTA) -->
                        <div id="infoView" class="text-center mt-3">
                            <div class="row text-start px-3">
                                <div class="col-12">
                                    <p class="info-label">Nombre Completo</p>
                                    <p class="info-value" id="viewNombre">---</p>
                                </div>
                                <div class="col-12">
                                    <p class="info-label">Email de la Cuenta</p>
                                    <p class="info-value" id="viewEmail">---</p>
                                </div>
                            </div>

                            <button type="button" id="btnShowEdit" class="btn btn-edit-toggle mt-3">
                                <i class="fas fa-user-edit me-2"></i> Editar Credenciales
                            </button>
                        </div>

                        <!-- SECCIÓN DE EDICIÓN (OCULTA INICIALMENTE) -->
                        <div id="editSection" class="edit-section">
                            <h5 class="fw-bold mb-4 text-gray-800">Actualizar Credenciales</h5>
                            <form id="profileForm">
                                <div class="mb-3">
                                    <label class="form-label small fw-bold text-muted">Nombre</label>
                                    <input type="text" class="form-control" id="nombre" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-bold text-muted">Email</label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label small fw-bold text-muted">Nueva Contraseña</label>
                                    <input type="password" class="form-control" id="password" placeholder="••••••••">
                                    <div class="form-text">Déjalo en blanco si no quieres cambiarla.</div>
                                </div>
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-save shadow-sm">
                                        <i class="fas fa-check-circle me-2"></i> Guardar Cambios
                                    </button>
                                    <button type="button" id="btnCancelEdit" class="btn btn-link text-muted text-decoration-none small">
                                        Cancelar
                                    </button>
                                </div>
                            </form>
                        </div>

                        <hr class="my-5">

                        <div class="text-center">
                            <button type="button" id="btnDelete" class="btn btn-delete-account">
                                <i class="fas fa-user-slash me-2"></i> Eliminar mi cuenta permanentemente
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/perfil.js"></script>
</body>
</html>
